<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plexi</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Plexi</h1>
        <p class="subtitle">Infinite 2D Canvas Terminal Multiplexer</p>
        
        <div class="canvas-placeholder" id="canvas">
            <p>🎯 Canvas will render here</p>
            <p class="hint">Pan: Arrow keys | Zoom: +/- | New Terminal: Ctrl+N</p>
        </div>

        <div class="status-bar" id="status">
            <span>Ready</span>
            <span id="position">x: 0, y: 0</span>
            <span id="zoom">zoom: 100%</span>
        </div>
    </div>

    <script src="index.ts"></script>
</body>
</html>
